# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# 以下为自定义的全局变量，可以在 HTML 文件中引用，
# 比如代码：<h1>{{ site.title }}</h1> 
# 将会展示为设定的值，也可以自行添加其他自定义全局变量。
#  基于 jekyll 的 Github Pages 个人博客网站，技术的学习、总结、分享与提升
title: AndrewYG的博客 # 网站的标题
description: > # 网站的描述，可能会出现在搜索引擎展示结果中
   个人博客网站，技术的学习、总结、分享与提升
url: "https://andrewyghub.github.io" # 网站地址
github_repo: "https://github.com/andrewyghub/andrewyghub.github.io"
github_profile: "https://github.com/andrewyghub" # GitHub 个人主页
user: "AndrewYG" # 用于侧栏展示的名字
user_email: "1346536346@qq.com" # 侧栏展示的联系方式
#paginate: 10 # 主页展示的博客文章数量
paginate: 5  # 每页显示的帖子数量
paginate_path: "/page:num/"  # 分页页面的路径



nick_name: "洋哥" # 昵称
english_name: "AndrewYG"

jekyll_env:
    env: "development"   #production  development

# Giscus 评论插件配置（基于 GitHub Discussions）
# repo_id 和 category_id 需到 https://giscus.app 生成后填入
comments:
    provider: "giscus"
    giscus:
        repo: "AndrewYGHUB/andrewyghub.github.io"
        repo_id: "MDEwOlJlcG9zaXRvcnkzODc2NTIxMzA="
        category: "Announcements"
        category_id: "DIC_kwDOFxsaIs4C9yhD"

# jekyll 相关配置
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-admin
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - COPYING
  - vendor
sass:
  style: compressed
lang: zh_CN
future: true
permalink: /:year/:month/:day/:title
theme: jekyll-theme-slate