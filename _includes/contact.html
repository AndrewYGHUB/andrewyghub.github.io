/* ===== CONTACT PAGE - HIGH-TECH THEME ===== */
:root {

    --neon-blue: #4d7cff;
    --neon-purple: #a855f7;
    --neon-green: #00ff88;
    --neon-orange: #ff6b35;
    --neon-pink: #ff4f8a;
    --dark-bg: #0a0e1a;
    --dark-card: #111827;
    --dark-card-border: #1e293b;
    --glass-bg: rgba(17, 24, 39, 0.75);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
}

.contact-page {
    position: relative;
    color: var(--text-primary);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    padding-bottom: 60px;
}

.contact-page-bg-override {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--dark-bg);
    z-index: -2;
}

#contact-canvas-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    pointer-events: none;
    will-change: transform;
}

.contact-page .contact-section {
    position: relative;
    z-index: 1;
}

.contact-scanline {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 8px;
    background: linear-gradient(180deg, transparent, rgba(0,240,255,0.06), transparent);
    z-index: 0;
    pointer-events: none;
    animation: c-scanline 6s linear infinite;
}

/* ---- keyframes ---- */
@keyframes c-scanline {
    0% { top: -10%; }
    100% { top: 110%; }
}
@keyframes c-fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes c-borderGlow {
    0%, 100% { border-color: rgba(0,240,255,0.3); }
    50% { border-color: rgba(0,240,255,0.7); }
}
@keyframes c-gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
@keyframes c-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,240,255,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(0,240,255,0); }
}

/* ---- HERO ---- */
.contact-hero {
    text-align: center;
    padding: 30px 20px 40px;
    animation: c-fadeInUp 1s ease;
}

.contact-hero-badge {
    display: inline-block;
    padding: 6px 24px;
    background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(168,85,247,0.15));
    border: 1px solid rgba(0,240,255,0.4);
    border-radius: 30px;
    font-size: 13px;
    color: var(--neon-cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: c-borderGlow 3s ease-in-out infinite;
    margin-bottom: 18px;
}

.contact-hero-title {
    font-size: 2.4em;
    font-weight: 800;
    margin: 5px 0;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-blue));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: c-gradientShift 4s ease infinite;
}

.contact-hero-sub {
    color: var(--text-secondary);
    font-size: 1.05em;
    margin-top: 8px;
}

/* ---- SECTION HEADERS ---- */
.c-section-header {
    text-align: center;
    margin-bottom: 36px;
}

.c-section-header h2 {
    font-size: 1.7em;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
    display: inline-block;
    position: relative;
}

.c-section-header h2::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
    border-radius: 3px;
}

.c-section-header .c-section-sub {
    color: var(--text-secondary);
    font-size: 0.95em;
    margin-top: 15px;
}

/* ---- CONTACT GRID ---- */
.contact-grid-wrap {
    max-width: 1000px;
    margin: 0 auto 50px;
    padding: 0 20px;
    animation: c-fadeInUp 1s ease 0.15s both;
}

.contact-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 22px;
}

.contact-card {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--dark-card-border);
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
}

.contact-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    opacity: 0;
    transition: opacity 0.4s;
}

.contact-card:hover {
    transform: translateY(-4px);
    border-color: rgba(0,240,255,0.4);
}

.contact-card:hover::before {
    opacity: 1;
}

.c-card-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
}

.c-card-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
}

.c-card-icon.wechat { background: linear-gradient(135deg, #07c160, #00a854); }
.c-card-icon.qq     { background: linear-gradient(135deg, #12b7f5, #1677ff); }
.c-card-icon.mail   { background: linear-gradient(135deg, var(--neon-purple), #6d28d9); }
.c-card-icon.msg    { background: linear-gradient(135deg, var(--neon-orange), #ff4757); }

.c-card-icon svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
}

.c-card-title {
    font-size: 1.15em;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
}

.c-card-sub {
    font-size: 0.82em;
    color: var(--text-secondary);
    margin-top: 3px;
    letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace;
}

.c-card-body {
    color: var(--text-secondary);
    font-size: 0.95em;
    line-height: 1.6;
}

/* QR card */
.c-qr-wrap {
    margin-top: 6px;
    text-align: center;
}

.c-qr-img {
    width: 160px;
    height: 160px;
    border-radius: 10px;
    cursor: zoom-in;
    border: 1px solid var(--dark-card-border);
    background: #fff;
    padding: 6px;
    transition: all 0.3s ease;
}

.c-qr-img:hover {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,240,255,0.25);
}

.c-qr-hint {
    font-size: 0.82em;
    color: var(--text-secondary);
    margin-top: 10px;
}

/* Copyable value */
.c-copy-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--dark-card-border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 4px;
    transition: border-color 0.25s;
}

.c-copy-row:hover {
    border-color: rgba(0,240,255,0.35);
}

.c-copy-value {
    flex: 1;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.98em;
    color: var(--neon-cyan);
    word-break: break-all;
}

.c-copy-btn {
    background: rgba(0,240,255,0.08);
    border: 1px solid rgba(0,240,255,0.3);
    color: var(--neon-cyan);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.78em;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
}

.c-copy-btn:hover {
    background: rgba(0,240,255,0.2);
    transform: translateY(-1px);
}

.c-copy-btn.copied {
    background: rgba(0,255,136,0.18);
    border-color: var(--neon-green);
    color: var(--neon-green);
}

.c-action-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
}

.c-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    background: rgba(0,240,255,0.06);
    border: 1px solid rgba(0,240,255,0.25);
    color: var(--neon-cyan) !important;
    border-radius: 20px;
    font-size: 0.85em;
    text-decoration: none !important;
    transition: all 0.25s;
}

.c-action-btn:hover {
    background: rgba(0,240,255,0.18);
    border-color: var(--neon-cyan);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,240,255,0.2);
}

.c-action-btn.primary {
    background: linear-gradient(135deg, rgba(168,85,247,0.18), rgba(0,240,255,0.18));
    border-color: rgba(168,85,247,0.5);
    color: #fff !important;
}

.c-action-btn.primary:hover {
    border-color: var(--neon-purple);
    box-shadow: 0 4px 16px rgba(168,85,247,0.3);
}

.c-action-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
}

/* ---- DONATION ---- */
.contact-donate {
    max-width: 1000px;
    margin: 0 auto 40px;
    padding: 0 20px;

}

.donate-card {

    padding: 30px;
    text-align: center;

}

.donate-card::after {

    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,79,138,0.06) 0%, transparent 50%);
    pointer-events: none;
}

.donate-trigger {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-orange));
    border: none;
    color: #fff;
    border-radius: 30px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(255,79,138,0.3);
    animation: c-pulse 2.5s ease-in-out infinite;
    position: relative;
    z-index: 1;
}

.donate-trigger:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(255,79,138,0.5);
}

.donate-trigger svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

.donate-hint {
    color: var(--text-secondary);
    font-size: 0.9em;
    margin-top: 14px;
    position: relative;
    z-index: 1;
}

.donate-qr-area {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease, margin-top 0.5s ease;
    position: relative;
    z-index: 1;
}

.donate-qr-area.open {
    max-height: 400px;
    margin-top: 24px;
}

.donate-qr-img {
    width: 220px;
    max-width: 80%;
    border-radius: 10px;
    background: #fff;
    padding: 8px;
    border: 1px solid var(--dark-card-border);
    cursor: zoom-in;
}

/* ---- LIGHTBOX ---- */
.c-lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
    animation: c-fadeInUp 0.3s ease;
}

.c-lightbox.open {
    display: flex;
}

.c-lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 12px;
    background: #fff;
    padding: 12px;
    box-shadow: 0 0 60px rgba(0,240,255,0.2);
}

.c-lightbox-close {
    position: absolute;
    top: 20px;
    right: 28px;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s;
}

.c-lightbox-close:hover {
    opacity: 1;
}

/* ---- TOAST ---- */
.c-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,255,136,0.95);
    color: #042814;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 0.9em;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 10000;
    box-shadow: 0 8px 30px rgba(0,255,136,0.3);
}

.c-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
    .contact-grid {
        grid-template-columns: 1fr;
        gap: 16px;
    }
    .contact-hero-title {
        font-size: 1.8em;
    }
    .contact-card {
        padding: 22px;
    }
    .c-qr-img {
        width: 140px;
        height: 140px;
    }
}
</style>

            <div class="donate-hint">点击展开收款码 · 一杯咖啡的鼓励</div>
            <div class="donate-qr-area" id="donate-qr-area">
                <img class="donate-qr-img c-zoomable" src="/assets/img/wxpay.png" alt="微信赞赏码">
            </div>
        </div>
    </div>

</div>

<!-- ====== LIGHTBOX ====== -->
<div class="c-lightbox" id="c-lightbox">
    <span class="c-lightbox-close" id="c-lightbox-close">&times;</span>
    <img id="c-lightbox-img" src="" alt="">
</div>

<!-- ====== TOAST ====== -->
<div class="c-toast" id="c-toast">已复制到剪贴板</div>

<!-- ====== CONTACT PAGE SCRIPTS ====== -->
<script>
(function() {
    // ======= Neural Network Canvas Background =======
    var canvas = document.getElementById('contact-canvas-bg');
    if (canvas) {
        var ctx = canvas.getContext('2d');
        var particles = [];
        var N = 35;
        var MAX_DIST_SQ = 120 * 120;
        var MOUSE_DIST_SQ = 180 * 180;
        var mouse = { x: -999, y: -999 };
        var paused = false;
        var rafId = 0;
        var w, h;

        function resize() {
            var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();

        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resize, 200);
        });

        var moveThrottle = false;
        document.addEventListener('mousemove', function(e) {
            if (moveThrottle) return;
            moveThrottle = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            setTimeout(function() { moveThrottle = false; }, 33);
        });

        for (var i = 0; i < N; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                r: Math.random() * 1.5 + 0.5,
                o: Math.random() * 0.5 + 0.2
            });
        }

        function animate() {
            if (paused) return;
            ctx.clearRect(0, 0, w, h);
            var i, j, p, p2, dx, dy, d2;

            for (i = 0; i < N; i++) {
                p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx = -p.vx;
                if (p.y < 0 || p.y > h) p.vy = -p.vy;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, 6.2832);
                ctx.fillStyle = 'rgba(0,240,255,' + p.o + ')';
                ctx.fill();
            }

            ctx.lineWidth = 0.5;
            ctx.beginPath();
            for (i = 0; i < N; i++) {
                p = particles[i];
                for (j = i + 1; j < N; j++) {
                    p2 = particles[j];
                    dx = p.x - p2.x;
                    dy = p.y - p2.y;
                    d2 = dx * dx + dy * dy;
                    if (d2 < MAX_DIST_SQ) {
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                    }
                }
            }
            ctx.strokeStyle = 'rgba(0,240,255,0.08)';
            ctx.stroke();

            if (mouse.x > 0) {
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                for (i = 0; i < N; i++) {
                    p = particles[i];
                    dx = p.x - mouse.x;
                    dy = p.y - mouse.y;
                    if (dx * dx + dy * dy < MOUSE_DIST_SQ) {
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                    }
                }
                ctx.strokeStyle = 'rgba(168,85,247,0.15)';
                ctx.stroke();
            }

            rafId = requestAnimationFrame(animate);
        }

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                paused = true;
                cancelAnimationFrame(rafId);
            } else {
                paused = false;
                rafId = requestAnimationFrame(animate);
            }
        });

        rafId = requestAnimationFrame(animate);
    }

    // ======= Copy to Clipboard =======
    var toast = document.getElementById('c-toast');
    var toastTimer;
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
            toast.classList.remove('show');
        }, 1800);
    }

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
        }
        // fallback
        return new Promise(function(resolve, reject) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                resolve();
            } catch (e) { reject(e); }
            document.body.removeChild(ta);
        });
    }

    document.querySelectorAll('.c-copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var targetId = btn.getAttribute('data-copy-target');
            var el = document.getElementById(targetId);
            if (!el) return;
            copyText(el.textContent.trim()).then(function() {
                btn.classList.add('copied');
                var orig = btn.textContent;
                btn.textContent = '已复制';
                showToast('已复制到剪贴板');
                setTimeout(function() {
                    btn.classList.remove('copied');
                    btn.textContent = orig;
                }, 1500);
            });
        });
    });

    // ======= Donation Toggle =======
    var donateTrigger = document.getElementById('donate-trigger');
    var donateArea = document.getElementById('donate-qr-area');
    var donateText = document.getElementById('donate-trigger-text');
    if (donateTrigger) {
        donateTrigger.addEventListener('click', function() {
            var opened = donateArea.classList.toggle('open');
            donateText.textContent = opened ? '收起收款码' : '点一杯咖啡给博主';
        });
    }

    // ======= Lightbox =======
    var lightbox = document.getElementById('c-lightbox');
    var lightboxImg = document.getElementById('c-lightbox-img');
    var lightboxClose = document.getElementById('c-lightbox-close');

    document.querySelectorAll('.c-zoomable').forEach(function(img) {
        img.addEventListener('click', function() {
            lightboxImg.src = img.src;
            lightboxImg.alt = img.alt || '';
            lightbox.classList.add('open');
        });
    });

    function closeLightbox() {
        lightbox.classList.remove('open');
        lightboxImg.src = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lightbox.classList.contains('open')) closeLightbox();
    });
})();
</script>
